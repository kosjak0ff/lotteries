name: Sync IAUI Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_SYNC_PAT != '' && secrets.AUTO_SYNC_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas xlrd openpyxl

      - name: Sync IAUI source and regenerate dataset
        run: python scripts/sync_iaui_source.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data/source assets/active_lotteries.json; then
            echo "No source or dataset changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source assets/active_lotteries.json
          git commit -m "🤖 T-006 Sync IAUI registry source"
          git push origin HEAD:main
